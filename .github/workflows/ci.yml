name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: clasificador_documentos_ia
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d clasificador_documentos_ia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_NAME: Clasificador Inteligente de Documentos con IA
      APP_ENV: test
      APP_HOST: 127.0.0.1
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/clasificador_documentos_ia
      UPLOADS_DIR: uploads
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DIMENSIONS: "384"
      SEMANTIC_SEARCH_TOP_K: "5"
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/1
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare runtime directories
        run: mkdir -p uploads

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run Ruff
        run: ruff check .

      - name: Run tests
        run: pytest -q
